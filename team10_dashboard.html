<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team 10 - Threat Intelligence Posture Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            border-bottom: 2px solid #21262d;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            color: #58a6ff;
            margin: 0;
            font-size: 24px;
        }
        .status-badge {
            background-color: #238636;
            color: white;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .alert-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .alert-card:hover {
            transform: translateY(-2px);
        }
        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .alert-title {
            font-size: 18px;
            font-weight: bold;
        }
        .severity {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .CRITICAL { background-color: #da3633; color: white; }
        .HIGH { background-color: #f78166; color: black; }
        .INFO { background-color: #388bfd; color: white; }
        
        .alert-details {
            background-color: #0d1117;
            border: 1px solid #21262d;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }
        .detail-item {
            margin: 4px 0;
        }
        .timestamp {
            color: #8b949e;
            font-size: 12px;
        }
        .no-alerts {
            text-align: center;
            padding: 50px;
            color: #8b949e;
            font-size: 16px;
            border: 2px dashed #21262d;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>SIEM Live Posture Stream (Team 10)</h1>
            <p style="margin: 5px 0 0 0; color: #8b949e; font-size: 14px;">Real-time Kafka threat correlation engine monitoring</p>
        </div>
        <div class="status-badge" id="stream-status">STREAM ACTIVE</div>
    </header>

    <div id="alerts-container">
        <div class="no-alerts">Waiting for critical threats from Kafka cluster stream...</div>
    </div>
</div>

<script>
    async function fetchAlerts() {
        try {
            // Fetching the local metrics/alerts file generated by team10_posture_stream.py
            const response = await fetch('team10_alerts.json?t=' + new Date().getTime());
            if (!response.ok) return;
            
            const alerts = await response.json();
            const container = document.getElementById('alerts-container');
            
            if (!alerts || alerts.length === 0) {
                return;
            }
            
            container.innerHTML = ''; // Clear out empty state
            
            alerts.forEach(alert => {
                const card = document.createElement('div');
                card.className = 'alert-card';
                
                // Formating standard key-values dynamically
                let detailsHtml = '';
                for (const [key, value] of Object.entries(alert.details)) {
                    detailsHtml += `<div class="detail-item"><strong>${key}:</strong> ${value}</div>`;
                }
                
                // Parse date cleanly
                const localTime = new Date(alert.timestamp).toLocaleTimeString();
                
                card.innerHTML = `
                    <div class="alert-header">
                        <span class="alert-title">${alert.alert_name}</span>
                        <div>
                            <span class="severity ${alert.severity}">${alert.severity}</span>
                        </div>
                    </div>
                    <div class="alert-details">
                        ${detailsHtml}
                    </div>
                    <div style="margin-top: 10px; text-align: right;">
                        <span class="timestamp">Detected at: ${localTime}</span>
                    </div>
                `;
                container.appendChild(card);
            });
            
        } catch (error) {
            console.log("Waiting for JSON data generation...");
        }
    }

    // Poll the JSON file every 3 seconds for updates
    setInterval(fetchAlerts, 3000);
    fetchAlerts();
</script>
</body>
</html>
